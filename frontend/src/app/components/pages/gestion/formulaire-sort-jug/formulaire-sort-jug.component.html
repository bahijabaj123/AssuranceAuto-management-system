<div class="form-wrap">
<div class="form-card">

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-state">
    <div class="spinner"></div>
    <p>Chargement du dossier...</p>
  </div>

  <!-- Formulaire -->
  <div *ngIf="!isLoading">

    <div class="f-title">
      <i class="fa fa-gavel" aria-hidden="true"></i>
      Sort jugement
    </div>
    <div class="f-sub">Bureau corporel — Carte Assurances</div>

    <div class="mode-badge" *ngIf="isEditMode">
      <i class="fa fa-pencil" style="font-size:11px" aria-hidden="true"></i>
      Mode édition — N° DOS {{ dossier.numDos || '...' }}
    </div>
    <div class="mode-badge new-mode" *ngIf="!isEditMode">
      <i class="fa fa-plus" style="font-size:11px" aria-hidden="true"></i>
      Nouveau jugement
    </div>

    <!-- Section 1: Identification -->
    <div class="section">
      <div class="sec-hdr">
        <div class="sec-icon"><i class="fa fa-file-text-o" aria-hidden="true"></i></div>
        <span class="sec-title">Identification</span>
      </div>
      <div class="grid2">
        <div class="fg">
          <label>N° DOS <span class="req">*</span></label>
          <input [(ngModel)]="dossier.numDos" placeholder="Ex: 20122800465" />
        </div>
        <div class="fg">
          <label>Jug. N°</label>
          <input [(ngModel)]="dossier.jugNum" placeholder="Ex: 9179" />
        </div>
        <div class="fg">
          <label>Région</label>
          <select [(ngModel)]="dossier.region">
            <option value="">Sélectionner</option>
            <option *ngFor="let r of regions" [value]="r">{{ r }}</option>
          </select>
        </div>
        <div class="fg">
          <label>Date signification</label>
          <input type="date" [(ngModel)]="dossier.dateSignification" />
        </div>
      </div>
    </div>

    <!-- Section 2: Exécution -->
    <div class="section">
      <div class="sec-hdr">
        <div class="sec-icon"><i class="fa fa-shield" aria-hidden="true"></i></div>
        <span class="sec-title">Exécution</span>
      </div>
      <div class="grid2">
        <div class="fg">
          <label>Huissier / Notaire</label>
          <input [(ngModel)]="dossier.huissierNotaire" placeholder="Ex: ABDELWAHEB SAIDI" />
        </div>
        <div class="fg">
          <label>Montant exécution</label>
          <input type="number" [(ngModel)]="dossier.montantExec" placeholder="0" step="0.01" />
        </div>
        <div class="fg">
          <label>Remis au financier le</label>
          <input type="date" [(ngModel)]="dossier.dateRemiseFinancier" />
        </div>
      </div>
    </div>

    <!-- Section 3: Observation -->
    <div class="section">
      <div class="sec-hdr">
        <div class="sec-icon"><i class="fa fa-comment-o" aria-hidden="true"></i></div>
        <span class="sec-title">Observation</span>
      </div>
      <div class="fg full">
        <textarea [(ngModel)]="dossier.observation" placeholder="A régler, appel, confirmation..." rows="3"></textarea>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-cancel" (click)="annuler()" type="button">
        <i class="fa fa-times" aria-hidden="true"></i> Annuler
      </button>
      <button class="btn-save" (click)="enregistrer()" [disabled]="isSaving">
        <i class="fa fa-floppy-o" aria-hidden="true"></i>
        {{ isSaving ? 'Enregistrement...' : 'Enregistrer le jugement' }}
      </button>
    </div>

  </div>
</div>
</div>
