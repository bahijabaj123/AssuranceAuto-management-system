<!-- src/app/components/pages/gestion/formulaire-judiciaire/formulaire-judiciaire.component.html -->
<div class="form-wrap">
  <div class="form-card">

    <!-- LOADING -->
    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Chargement du dossier...</p>
    </div>

    <!-- FORMULAIRE -->
    <div *ngIf="!isLoading && isDataLoaded">

      <div class="f-title">
        <i class="fa fa-file-text-o" aria-hidden="true"></i>
        Dossier judiciaire
      </div>
      <p class="f-sub">Bureau corporel — Carte Assurances</p>

      <div class="mode-badge" *ngIf="isEditMode">
        <i class="fa fa-pencil" aria-hidden="true"></i>
        Mode édition — Dossier N° {{ dossier.numDos }}
      </div>
      <div class="mode-badge new-mode" *ngIf="!isEditMode">
        <i class="fa fa-plus" aria-hidden="true"></i>
        Nouveau dossier judiciaire
      </div>

      <form (ngSubmit)="enregistrer()" #form="ngForm">

        <!-- INFORMATIONS GÉNÉRALES -->
        <div class="section">
          <div class="sec-hdr">
            <div class="sec-icon"><i class="fa fa-folder" aria-hidden="true"></i></div>
            <span class="sec-title">Informations générales</span>
          </div>
          <div class="grid3">
            <div class="fg">
              <label>N° DOS <span class="req">*</span></label>
              <input 
                [(ngModel)]="dossier.numDos" 
                name="numDos" 
                required
                [disabled]="isEditMode"
                placeholder="Ex: 20222600172"
                #numDos="ngModel"
              />
              <div *ngIf="numDos.invalid && numDos.touched" class="error-msg">
                Le numéro de dossier est obligatoire
              </div>
            </div>
            <div class="fg">
              <label>1er AUD</label>
              <input type="date" [(ngModel)]="dossier.dateAudience" name="dateAudience"/>
            </div>
            <div class="fg">
              <label>Tiers</label>
              <input [(ngModel)]="dossier.tiers" name="tiers" placeholder="Nom du tiers"/>
            </div>
            <div class="fg">
              <label>IPP (%)</label>
              <input type="number" step="0.1" [(ngModel)]="dossier.ipp" name="ipp" placeholder="0"/>
            </div>
            <div class="fg">
              <label>NB jours</label>
              <input type="number" [(ngModel)]="dossier.nbJours" name="nbJours" placeholder="0"/>
            </div>
            <div class="fg">
              <label>Nat. affaire</label>
              <select [(ngModel)]="dossier.natureAff" name="natureAff">
                <option value="">Sélectionner</option>
                <option *ngFor="let n of naturesAffaire" [value]="n">{{ n }}</option>
              </select>
            </div>
            <div class="fg">
  <label>Règlements</label>
  <input type="text" [(ngModel)]="dossier.reglements" name="reglements" placeholder="Montant ou référence"/>
</div>
            <div class="fg">
              <label>Région</label>
              <select [(ngModel)]="dossier.region" name="region">
                <option value="">Sélectionner</option>
                <option *ngFor="let r of regions" [value]="r">{{ r }}</option>
              </select>
            </div>
            <div class="fg">
              <label>Avocat</label>
              <input [(ngModel)]="dossier.avocat" name="avocat" placeholder="Nom de l'avocat"/>
            </div>
          </div>
        </div>

        <!-- 1ÈRE INSTANCE -->
        <div class="section">
          <div class="sec-hdr">
            <div class="sec-icon"><i class="fa fa-balance-scale" aria-hidden="true"></i></div>
            <span class="sec-title">1ère instance</span>
            <span class="tier-badge tb1">Étape 1</span>
          </div>
          <div class="grid3">
            <div class="fg">
              <label>Aff. N°</label>
              <input [(ngModel)]="dossier.affInstance" name="affInstance" placeholder="N° affaire"/>
            </div>
            <div class="fg">
              <label>Date report</label>
              <input type="date" [(ngModel)]="dossier.dateReportInstance" name="dateReportInstance"/>
            </div>
            <div class="fg">
              <label>Date jugement</label>
              <input type="date" [(ngModel)]="dossier.dateJugInstance" name="dateJugInstance"/>
            </div>
          </div>
        </div>

        <!-- COUR D'APPEL -->
        <div class="section">
          <div class="sec-hdr">
            <div class="sec-icon"><i class="fa fa-university" aria-hidden="true"></i></div>
            <span class="sec-title">Cour d'appel</span>
            <span class="tier-badge tb2">Étape 2</span>
          </div>
          <div class="grid3">
            <div class="fg">
              <label>Aff. N°</label>
              <input [(ngModel)]="dossier.affAppel" name="affAppel" placeholder="Ex: 2257/2258"/>
            </div>
            <div class="fg">
              <label>Date report</label>
              <input type="date" [(ngModel)]="dossier.dateReportAppel" name="dateReportAppel"/>
            </div>
            <div class="fg">
              <label>Date jugement</label>
              <input type="date" [(ngModel)]="dossier.dateJugAppel" name="dateJugAppel"/>
            </div>
          </div>
        </div>

        <!-- CASSATION -->
        <div class="section">
          <div class="sec-hdr">
            <div class="sec-icon"><i class="fa fa-gavel" aria-hidden="true"></i></div>
            <span class="sec-title">Cassation</span>
            <span class="tier-badge tb3">Étape 3</span>
          </div>
          <div class="grid2">
            <div class="fg">
              <label>Aff. N°</label>
              <input [(ngModel)]="dossier.affCassation" name="affCassation" placeholder="N° affaire"/>
            </div>
            <div class="fg">
              <label>Date jugement</label>
              <input type="date" [(ngModel)]="dossier.dateJugCassation" name="dateJugCassation"/>
            </div>
          </div>
        </div>

        <!-- OBSERVATION -->
        <div class="section">
          <div class="sec-hdr">
            <div class="sec-icon"><i class="fa fa-sticky-note-o" aria-hidden="true"></i></div>
            <span class="sec-title">Observation</span>
          </div>
          <div class="fg full">
            <textarea 
              [(ngModel)]="dossier.observation" 
              name="observation"
              placeholder="Confirmation, augmentation, pourvoi en cours..."
              rows="4"
            ></textarea>
          </div>
        </div>

        <!-- ACTIONS -->
        <div class="actions">
          <button type="button" class="btn-cancel" (click)="annuler()">
            <i class="fa fa-times" aria-hidden="true"></i> Annuler
          </button>
          <button type="submit" class="btn-save" [disabled]="isSaving || form.invalid">
            <i class="fa fa-floppy-o" aria-hidden="true"></i>
            {{ isSaving ? 'Enregistrement...' : 'Enregistrer le dossier' }}
          </button>
        </div>

      </form>

    </div>
  </div>
</div>
