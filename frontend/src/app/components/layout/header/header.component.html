<!-- src/app/components/layout/header/header.component.html -->
<header class="header">
  
  <!-- Gauche -->
  <div class="header-left">
    <!-- ✅ Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" (click)="toggleSidebar()" aria-label="Menu">
      <i class="fa fa-bars" aria-hidden="true"></i>
    </button>
    
    <span class="page-title">
      <i class="fa fa-home" aria-hidden="true"></i>
      Accueil
      <span class="page-subtitle">Bureau Corporel</span>
    </span>
  </div>

  <!-- Droite -->
  <div class="header-right">
      <app-alerte-bell></app-alerte-bell>

    
    <!-- ✅ User Info -->
    <div class="user-info" routerLink="/profil">
      <div class="user-avatar">{{ initiales }}</div>
      <div>
        <div class="user-name">{{ userNom }}</div>
        <div class="user-role">{{ userRole }}</div>
      </div>
    </div>

    <!-- ✅ Déconnexion -->
    <button class="btn-logout" (click)="logout()" title="Déconnexion">
      <i class="fa fa-sign-out" aria-hidden="true"></i>
      <span>Déconnexion</span>
    </button>

  </div>

</header>
