# ============================================================
# CONFIGURATION SPRING BOOT
# ============================================================
spring.application.name=estimateur-ipp-backend
server.port=${PORT:8081}

# ============================================================
# CONFIGURATION MYSQL
# ============================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:carte_gestion_dossiers}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&zeroDateTimeBehavior=convertToNull
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# CONFIGURATION JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# LOGGING
# ============================================================
logging.level.com.carte.estimateurippbackend=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# JWT
# ============================================================
jwt.secret=${JWT_SECRET:changeme-local-secret-key}
jwt.expiration=86400000

# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# ============================================================
# SPRING MAIL - GMAIL SMTP CONFIGURATION
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:carteassurances.alerte@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.smtp.from=${MAIL_USERNAME:carteassurances.alerte@gmail.com}
spring.mail.properties.mail.smtp.replyto=${MAIL_USERNAME:carteassurances.alerte@gmail.com}

spring.mail.properties.mail.smtp.dsn.notify=SUCCESS,FAILURE,DELAY
spring.mail.properties.mail.smtp.dsn.ret=HEADER

spring.mail.properties.mail.smtp.allow8bitmime=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

spring.task.scheduling.enabled=true
app.alerte.test-mode=false
app.alerte.cron=0 30 9 * * *
